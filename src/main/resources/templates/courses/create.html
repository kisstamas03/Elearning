<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Új kurzus létrehozása – ME-Learning</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link th:href="@{/css/main.css}" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar" th:replace="~{fragments/sidebar :: sidebar('create-course')}"></aside>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="main-content">

  <div class="page-header">
    <div class="d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-primary d-lg-none me-3 hamburger-btn" id="sidebarToggleBtn">
          <i class="fas fa-bars"></i>
        </button>
        <div>
          <h1 style="margin-bottom: 0;"><i class='fas fa-layer-group me-2'></i>Új kurzus létrehozása</h1>
          <p class="mb-0 d-none d-sm-block">Indíts el egy új oktatási anyagot a platformon!</p>
        </div>
      </div>
      <a th:href="@{/courses}" class="btn btn-sm"
         style="background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);">
        <i class="fas fa-arrow-left me-1"></i>Vissza
      </a>
    </div>
  </div>

  <div class="content">
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card-box shadow-sm">
          <div class="card-box-head">
            <h5><i class="fas fa-edit me-2 text-primary"></i>Alapvető információk</h5>
          </div>
          <div class="card-box-body">

            <form th:action="@{/courses/create}" method="post" th:object="${course}">

              <div class="mb-4">
                <label for="title" class="form-label" style="font-weight: 600; color: #1e293b;">Kurzus címe <span class="text-danger">*</span></label>
                <input type="text" id="title" class="form-control" th:field="*{title}"
                       placeholder="Pl.: Bevezetés a Java programozásba" required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
              </div>

              <div class="mb-4">
                <label for="description" class="form-label" style="font-weight: 600; color: #1e293b;">Rövid leírás</label>
                <textarea id="description" class="form-control" th:field="*{description}" rows="5"
                          placeholder="Miről fog szólni ez a kurzus? Milyen tudást szerezhetnek meg a diákok?"></textarea>
              </div>

              <div class="mb-4 p-3 rounded" style="background-color: #f8fafc; border: 1px solid #e2e8f0;">
                <div class="form-check d-flex align-items-center mb-0">
                  <input class="form-check-input mt-0 me-3" type="checkbox" id="isPublic" th:field="*{isPublic}" style="transform: scale(1.3); cursor: pointer;">
                  <label class="form-check-label mb-0" for="isPublic" style="cursor: pointer;">
                    <span style="font-weight: 600; color: #334155; display: block;">Publikus kurzus</span>
                    <span class="small text-muted">Ha be van pipálva, a kurzus mindenki számára látható lesz a listában, és a hallgatók szabadon beiratkozhatnak.</span>
                  </label>
                </div>
              </div>

              <hr style="border-color: #e2e8f0;">

              <div class="d-flex justify-content-end gap-2 mt-3">
                <a th:href="@{/courses}" class="btn btn-outline-secondary">Mégse</a>
                <button type="submit" class="btn btn-primary px-4">
                  <i class="fas fa-save me-2"></i>Létrehozás
                </button>
              </div>
            </form>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const toggleBtn = document.getElementById('sidebarToggleBtn');
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    if (toggleBtn && sidebar && overlay) {
      // Gombnyomásra kinyitjuk/becsukjuk
      toggleBtn.addEventListener('click', function() {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
      });

      // Ha a sötét háttérre kattintanak, csukjuk be a menüt
      overlay.addEventListener('click', function() {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
      });
    }
  });
</script>
</body>
</html>
